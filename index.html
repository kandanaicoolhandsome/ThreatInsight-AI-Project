<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Insight Pro | By SUPERCOOLHANDSOMEBOY</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #07090e;
            --surface: #0f1219;
            --card-bg: rgba(23, 28, 41, 0.7);
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.3);
            --accent: #818cf8;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --vulnerability: #f43f5e;
            --malware: #c084fc;
            --attack: #fbbf24;
            --info: #34d399;
            --indicator: #c084fc;
            --campaign: #22d3ee;
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'IBM Plex Sans Thai', sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, var(--bg-dark) 80%);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 1rem 2rem;
            background: rgba(7, 9, 14, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--primary);
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 6px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            font-weight: 700;
            margin-left: 10px;
            -webkit-text-fill-color: initial;
        }

        .search-container {
            position: relative;
            width: 320px;
        }

        .search-container input {
            width: 100%;
            padding: 0.6rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            outline: none;
            font-size: 0.85rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-container input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            width: 380px;
        }

        .btn-sync {
            padding: 0.6rem 1.25rem;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
        }

        .btn-sync:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4);
        }

        main {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 0;
            max-width: 100%;
            height: calc(100vh - 65px);
        }

        .news-list {
            overflow-y: auto;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-right: 1px solid var(--border);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        .news-item {
            background: var(--card-bg);
            padding: 1.25rem;
            border-radius: 16px;
            margin-bottom: 1rem;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .news-item:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: var(--primary);
            transform: translateX(4px);
        }

        .news-item.active {
            background: rgba(56, 189, 248, 0.05);
            border-color: var(--primary);
            box-shadow: inset 0 0 20px rgba(56, 189, 248, 0.1);
        }

        .news-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: transparent;
            transition: 0.3s;
        }

        .news-item.item-vulnerability::before {
            background: var(--vulnerability);
        }

        .news-item.item-attack::before {
            background: var(--attack);
        }

        .news-item.item-malware::before {
            background: var(--malware);
        }

        .news-item.item-info::before {
            background: var(--info);
        }

        .tag {
            font-size: 0.6rem;
            text-transform: uppercase;
            padding: 3px 10px;
            border-radius: 6px;
            font-weight: 800;
            margin-bottom: 0.75rem;
            display: inline-block;
            letter-spacing: 0.05em;
        }

        .tag-vulnerability {
            background: rgba(244, 63, 94, 0.1);
            color: var(--vulnerability);
        }

        .tag-attack {
            background: rgba(251, 191, 36, 0.1);
            color: var(--attack);
        }

        .tag-malware {
            background: rgba(192, 132, 252, 0.1);
            color: var(--malware);
        }

        .tag-info {
            background: rgba(52, 211, 153, 0.1);
            color: var(--info);
        }

        .item-title {
            font-size: 1rem;
            line-height: 1.5;
            font-weight: 600;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-meta {
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .source-badge {
            padding: 2px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            font-weight: 800;
            font-size: 0.6rem;
            letter-spacing: 0.05em;
            transition: all 0.3s;
        }

        .detail-view {
            padding: 3rem 4rem;
            overflow-y: auto;
            background: transparent;
        }

        .report-header {
            margin-bottom: 3rem;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .report-title {
            font-size: 2.25rem;
            font-weight: 800;
            line-height: 1.2;
            margin: 1rem 0;
            letter-spacing: -0.025em;
        }

        .section {
            margin-bottom: 3rem;
        }

        .section-header {
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .summary-content {
            font-size: 1.15rem;
            line-height: 1.85;
            color: var(--text-primary);
            font-weight: 400;
            white-space: pre-line;
        }

        .context-card {
            background: linear-gradient(165deg, rgba(30, 41, 59, 0.4), rgba(7, 9, 14, 0.4));
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            position: relative;
        }

        .attribution-box {
            display: inline-flex;
            align-items: center;
            background: rgba(56, 189, 248, 0.08);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            margin-bottom: 2rem;
        }

        .cve-grid {
            display: grid;
            gap: 1.25rem;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }

        .cve-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 18px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .cve-card:hover {
            border-color: var(--vulnerability);
            transform: translateY(-3px);
        }

        .view-report-btn {
            padding: 0.75rem 1.5rem;
            background: transparent;
            color: var(--primary);
            border: 1.5px solid var(--primary);
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.8rem;
            text-decoration: none;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .view-report-btn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .ioc-pill {
            display: inline-block;
            background: rgba(192, 132, 252, 0.1);
            color: var(--indicator);
            padding: 6px 12px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            font-size: 0.85rem;
            border: 1px solid rgba(192, 132, 252, 0.2);
            margin: 4px;
        }

        /* New Delete Button Styles */
        .btn-delete {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(244, 63, 94, 0.1);
            color: var(--vulnerability);
            border: 1px solid rgba(244, 63, 94, 0.2);
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
            z-index: 10;
        }

        /* Remove opacity toggle since we're using context menu */
        .news-item:hover .btn-delete {
            opacity: 0;
            pointer-events: none;
        }

        /* Context Menu Styles */
        #contextMenu {
            position: fixed;
            display: none;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            z-index: 1000;
            padding: 5px;
            min-width: 160px;
            backdrop-filter: blur(10px);
        }

        .context-item {
            padding: 10px 15px;
            font-size: 0.85rem;
            color: var(--text-primary);
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }

        .context-item:hover {
            background: rgba(244, 63, 94, 0.1);
            color: var(--vulnerability);
        }

        /* Status Toast Styles */
        #statusToast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--surface);
            border: 1px solid var(--primary);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #statusToast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .loader {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(56, 189, 248, 0.2);
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo-area">
            <h1>THREAT INSIGHT <span class="badge">BY superARTcoolhandsomeboy</span></h1>
        </div>
        <div style="display:flex; align-items: center; gap: 2rem;">
            <div id="totalNewsCount"
                style="font-size: 0.7rem; font-weight: 700; color: var(--info); letter-spacing: 0.1em; display: flex; align-items: center; gap: 8px;">
                <span
                    style="width: 8px; height: 8px; background: var(--info); border-radius: 50%; display: inline-block; box-shadow: 0 0 12px var(--info);"></span>
                0 INTEL REPORTS
            </div>
            <div class="search-container"><input type="text" id="searchInput"
                    placeholder="Search (CVE, Date, IOC, Sector...)" onkeyup="filterNews()"></div>
            <div
                style="display: flex; gap: 0.5rem; background: rgba(30, 41, 59, 0.8); padding: 4px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);">
                <input type="text" id="customUrlInput" placeholder="Paste External News URL..."
                    style="background: transparent; border: none; color: white; padding: 0.4rem; outline: none; width: 200px; font-size: 0.8rem;">
                <button class="btn-sync" onclick="analyzeUrl()" id="analyzeBtn"
                    style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">🔍 ANALYZE</button>
            </div>
            <button class="btn-sync" onclick="syncFeeds()" id="syncBtn">⚡ INTEL SYNC</button>
        </div>
    </header>
    <main>
        <div class="news-list" id="newsList"></div>
        <div class="detail-view" id="detailView">
            <div style="text-align:center; opacity: 0.3; margin-top:15vh;">
                <h2 style="font-size: 3rem; margin-bottom: 1rem;">⌘</h2>
                <p style="font-size: 1.2rem; font-weight: 300;">Select an Intelligence Report to begin deep analysis</p>
            </div>
        </div>
    </main>
    <div id="statusToast">
        <div class="loader" id="toastLoader"></div>
        <span id="toastMsg">Syncing...</span>
    </div>
    <div id="contextMenu">
        <div class="context-item" id="ctxDeleteBtn">
            <span>🗑️</span> Delete Intelligence
        </div>
    </div>
    <script>
        let allNews = []; let filteredNews = []; let activeId = null;
        let rightClickedId = null;

        const SOURCE_COLORS = {
            'The Hacker News': { bg: 'rgba(244, 63, 94, 0.15)', text: '#f43f5e', border: 'rgba(244, 63, 94, 0.3)' },
            'BleepingComputer': { bg: 'rgba(251, 191, 36, 0.15)', text: '#fbbf24', border: 'rgba(251, 191, 36, 0.3)' },
            'SecurityWeek': { bg: 'rgba(192, 132, 252, 0.15)', text: '#c084fc', border: 'rgba(192, 132, 252, 0.3)' },
            'Cyber Security News': { bg: 'rgba(52, 211, 153, 0.15)', text: '#34d399', border: 'rgba(52, 211, 153, 0.3)' },
            'Dark Reading': { bg: 'rgba(129, 140, 248, 0.15)', text: '#818cf8', border: 'rgba(129, 140, 248, 0.3)' },
            'Security Online': { bg: 'rgba(34, 211, 238, 0.15)', text: '#22d3ee', border: 'rgba(34, 211, 238, 0.3)' },
            'CISA KEV': { bg: 'rgba(56, 189, 248, 0.2)', text: '#38bdf8', border: 'rgba(56, 189, 248, 0.4)' }
        };

        function getSourceStyle(source) {
            const style = SOURCE_COLORS[source] || { bg: 'rgba(148, 163, 184, 0.1)', text: '#94a3b8', border: 'rgba(148, 163, 184, 0.2)' };
            return `background: ${style.bg}; color: ${style.text}; border: 1px solid ${style.border};`;
        }

        function showStatus(msg, persistent = false) {
            const toast = document.getElementById('statusToast');
            const loader = document.getElementById('toastLoader');
            const toastMsg = document.getElementById('toastMsg');

            toastMsg.innerText = msg;
            loader.style.display = persistent ? 'block' : 'none';
            toast.classList.add('show');

            if (!persistent) {
                setTimeout(() => toast.classList.remove('show'), 3000);
            }
        }

        function hideStatus() {
            document.getElementById('statusToast').classList.remove('show');
        }

        async function fetchNews() {
            try {
                const res = await fetch('http://127.0.0.1:8000/news');
                allNews = await res.json();
                allNews.sort((a, b) => {
                    const parseDT = (str) => {
                        if (!str) return 0;
                        const [dPart, tPart] = str.split(' ');
                        const [d, m, y] = dPart.split('/').map(Number);
                        const [hh, mm] = (tPart || "00:00").split(':').map(Number);
                        return new Date(y, m - 1, d, hh, mm).getTime();
                    };
                    return parseDT(b.published_time) - parseDT(a.published_time);
                });
                filteredNews = [...allNews];
                document.getElementById('totalNewsCount').innerHTML = `<span style="width: 8px; height: 8px; background: var(--info); border-radius: 50%; box-shadow: 0 0 12px var(--info);"></span> ${allNews.length} INTEL REPORTS`;
                render();
            } catch (e) { console.error(e); }
        }

        async function syncFeeds() {
            const btn = document.getElementById('syncBtn'); btn.innerText = "Syncing..."; btn.disabled = true;
            showStatus("Syncing intelligence from global sources...", true);
            try {
                await fetch('http://127.0.0.1:8000/sync', { method: 'POST' });
                setTimeout(async () => {
                    await fetchNews();
                    btn.innerText = "⚡ INTEL SYNC";
                    btn.disabled = false;
                    hideStatus();
                    showStatus("Sync complete!");
                }, 8000);
            } catch (e) {
                btn.disabled = false;
                btn.innerText = "⚡ INTEL SYNC";
                hideStatus();
            }
        }

        async function analyzeUrl() {
            const input = document.getElementById('customUrlInput');
            const btn = document.getElementById('analyzeBtn');
            const url = input.value.trim();

            if (!url) { showStatus("Please paste a URL first!"); return; }

            btn.innerText = "Analyzing..."; btn.disabled = true;
            showStatus(`Analyzing external report...`, true);

            try {
                const response = await fetch('http://127.0.0.1:8000/analyze-url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                const data = await response.json();
                input.value = "";

                await fetchNews();
                btn.innerText = "🔍 ANALYZE";
                btn.disabled = false;
                hideStatus();
                showStatus(data.message);

            } catch (e) {
                console.error(e);
                hideStatus();
                showStatus("Failed to analyze the URL.");
                btn.innerText = "🔍 ANALYZE"; btn.disabled = false;
            }
        }

        async function deleteNews(id) {
            if (!confirm("Are you sure you want to delete this intelligence report?")) return;

            try {
                await fetch(`http://127.0.0.1:8000/news/${id}`, { method: 'DELETE' });
                if (activeId === id) {
                    document.getElementById('detailView').innerHTML = `
                        <div style="text-align:center; opacity: 0.3; margin-top:15vh;">
                            <h2 style="font-size: 3rem; margin-bottom: 1rem;">⌘</h2>
                            <p style="font-size: 1.2rem; font-weight: 300;">Select an Intelligence Report to begin deep analysis</p>
                        </div>`;
                    activeId = null;
                }
                await fetchNews();
                showStatus("Report deleted.");
            } catch (e) {
                console.error(e);
                showStatus("Failed to delete.");
            }
        }

        // --- Context Menu Logic ---
        window.addEventListener('click', () => {
            document.getElementById('contextMenu').style.display = 'none';
        });

        function handleRightClick(e, id) {
            e.preventDefault();
            rightClickedId = id;
            const menu = document.getElementById('contextMenu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
        }

        document.getElementById('ctxDeleteBtn').onclick = () => {
            if (rightClickedId) deleteNews(rightClickedId);
            document.getElementById('contextMenu').style.display = 'none';
        };

        function filterNews() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            filteredNews = allNews.filter(n =>
                n.title.toLowerCase().includes(q) ||
                (n.published_time && n.published_time.includes(q)) ||
                (n.vulnerabilities && n.vulnerabilities.some(v => v.cve.toLowerCase().includes(q)))
            );
            render();
        }

        function render() {
            const list = document.getElementById('newsList');
            list.innerHTML = filteredNews.map(n => {
                const cat = (n.category || 'info').toLowerCase();
                const timeStr = n.published_time ? `${n.published_time.split(' ')[0]}` : "N/A";
                return `
                <div class="news-item item-${cat} ${activeId === n.id ? 'active' : ''}" 
                     onclick="showDetail(${n.id})" 
                     oncontextmenu="handleRightClick(event, ${n.id})">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="tag tag-${cat}">${n.category || 'INFO'}</span>
                        <span style="font-size: 0.65rem; color: var(--text-secondary);">${timeStr}</span>
                    </div>
                    <div class="item-title">${n.title}</div>
                    <div class="item-meta">
                        <span class="source-badge" style="${getSourceStyle(n.source)}">${n.source}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function showDetail(id) {
            activeId = id; render();
            const n = allNews.find(x => x.id === id); if (!n) return;
            const view = document.getElementById('detailView');

            const validVulns = (n.vulnerabilities || []).filter(v => v.cve && !v.cve.includes('XXXX') && v.cve.length > 5);
            const validIocs = (n.indicators || []).filter(i => i.value && i.value.length > 3 && !i.value.includes('ไม่ทราบ'));

            view.innerHTML = `
                <div class="report-header">
                    <span class="tag tag-${(n.category || 'info').toLowerCase()}">${n.category || 'INFO'}</span>
                    <h2 class="report-title">${n.title}</h2>
                    <div style="display:flex; justify-content:space-between; align-items: center;">
                        <div style="color:var(--text-secondary); font-size: 0.9rem; display: flex; align-items: center; gap: 12px;">
                            By <span class="source-badge" style="${getSourceStyle(n.source)}">${n.source}</span> • 📅 ${n.published_time}
                        </div>
                        ${n.source_url ? `<a href="${n.source_url}" target="_blank" class="view-report-btn">READ ORIGINAL →</a>` : ''}
                    </div>
                </div>

                <div class="section">
                    <div class="section-header">Executive Summary</div>
                    <div class="summary-content">
                        ${Array.isArray(n.executive_summary)
                    ? `<ul style="list-style: none; padding: 0;">${n.executive_summary.map(item => `<li style="margin-bottom: 0.75rem; display: flex; align-items: flex-start;"><span style="color: var(--primary); margin-right: 12px; margin-top: 4px;">▹</span><span>${item}</span></li>`).join('')}</ul>`
                    : n.executive_summary || 'No detailed analysis found.'}
                    </div>
                </div>

                <div class="section">
                    <div class="section-header">Intelligence Context</div>
                    <div class="context-card">
                        ${(n.intelligence_context?.attacker_group && !['null', 'unknown', 'n/a', 'ไม่มี'].includes(n.intelligence_context.attacker_group.toLowerCase())) ? `
                            <div class="attribution-box">
                                <span style="font-size:1.5rem; margin-right:1rem;">🛡️</span>
                                <div>
                                    <div style="font-size:0.7rem; text-transform:uppercase; color:var(--text-secondary); font-weight:800; opacity:0.6;">Threat Attribution</div>
                                    <div style="color:var(--primary); font-weight:700; font-size:1.4rem; letter-spacing:-0.01em;">${n.intelligence_context.attacker_group}</div>
                                </div>
                            </div>` : ''}
                        
                        <div style="font-size: 1.15rem; color: var(--text-primary); line-height: 1.9; border-left: 3px solid var(--accent); padding-left: 2rem;">
                            ${Array.isArray(n.intelligence_context?.historical_narrative)
                    ? `<ul style="list-style: none; padding: 0;">${n.intelligence_context.historical_narrative.map(item => `<li style="margin-bottom: 0.8rem; display: flex; align-items: flex-start;"><span style="color: var(--accent); margin-right: 12px; margin-top: 4px;">•</span><span>${item}</span></li>`).join('')}</ul>`
                    : n.intelligence_context?.historical_narrative || 'ไม่มีข้อมูลบริบทประวัติศาสตร์เพิ่มเติม'}
                        </div>
                    </div>
                </div>

                ${(validVulns.length > 0) ? `
                <div class="section">
                    <div class="section-header">Vulnerabilities (CVE)</div>
                    <div class="cve-grid">
                        ${validVulns.map(v => `
                        <div class="cve-card">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <h4 style="color:var(--vulnerability); font-size: 1.35rem; font-weight:800;">${v.cve}</h4>
                                ${v.kev ? '<span style="background:var(--vulnerability); color:#fff; font-size:0.65rem; padding:2px 8px; border-radius:4px; font-weight:900;">KEV</span>' : ''}
                            </div>
                            <p style="font-size: 0.9rem; margin: 10px 0; color:var(--text-secondary);"><b>Target:</b> ${v.product}</p>
                            <div style="border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px; display:flex; justify-content:space-between; font-size:0.8rem;">
                                <span>Severity: <b style="color:#fff;">${v.severity}</b></span>
                                <span>EPSS: <b style="color:var(--primary);">${v.epss || '0.12'}</b></span>
                            </div>
                        </div>`).join('')}
                    </div>
                </div>` : ''}

                ${(validIocs.length > 0) ? `
                <div class="section">
                    <div class="section-header">Tactical Indicators (IOCs)</div>
                    <div style="background: rgba(0,0,0,0.2); border-radius: 20px; border: 1px solid var(--border); overflow: hidden;">
                        <table style="width: 100%; border-collapse: collapse; table-layout: fixed;">
                            <thead>
                                <tr style="background: rgba(255,255,255,0.03); color: var(--text-secondary); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em;">
                                    <th style="padding: 1.25rem 1.5rem; width: 12%; border-bottom: 2px solid var(--border); text-align: center;">Type</th>
                                    <th style="padding: 1.25rem 1.5rem; width: 33%; border-bottom: 2px solid var(--border); text-align: center;">Tactical Value</th>
                                    <th style="padding: 1.25rem 2rem; width: 55%; border-bottom: 2px solid var(--border); text-align: center;">Context / Description</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${validIocs.map(i => `
                                <tr style="border-bottom: 1px solid var(--border); transition: background 0.15s;">
                                    <td style="padding: 1.25rem 1.5rem; vertical-align: middle; text-align: center;">
                                        <span style="color: var(--indicator); font-weight: 800; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.05em; background: rgba(192, 132, 252, 0.05); padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(192, 132, 252, 0.1); display: inline-block;">${i.type}</span>
                                    </td>
                                    <td style="padding: 1.25rem 1.5rem; vertical-align: middle; text-align: center;">
                                        <code style="color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; line-height: 1.4; display: block; word-break: break-all; text-align: center;">${i.value}</code>
                                    </td>
                                    <td style="padding: 1.25rem 2rem; vertical-align: middle; color: var(--text-secondary); font-size: 0.95rem; line-height: 1.7; font-weight: 300; text-align: center;">
                                        ${i.description || 'No additional context available'}
                                    </td>
                                </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>` : ''}
            `;
            // Scroll to top of detail view
            view.scrollTo({ top: 0, behavior: 'smooth' });
        }
        fetchNews();
    </script>
</body>

</html>
